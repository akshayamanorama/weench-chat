<html lang=&quot;en&quot;>
<head>

<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no&quot;>
<title>Weench</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0EB;
  --bg2:#FFF;
  --bg3:#F0EBE5;
  --bg4:#E8E2DB;
  --card:#FFF;
  --card2:#F8F5F1;
  --tx:#1A1A1A;
  --tx2:#6B6B6B;
  --tx3:#9E9E9E;
  --accent:#2D2D2D;
  --accent2:#1A1A1A;
  --blue:#007AFF;
  --green:#34C759;
  --red:#FF3B30;
  --sep:rgba(0,0,0,.06);
  --shadow:0 2px 12px rgba(0,0,0,.06);
  --shadow2:0 4px 20px rgba(0,0,0,.08);
  --safe-top:54px;
  --safe-bot:30px;
}
html,body{height:100%;width:100%;overflow:hidden;font-family:'SF Pro Display','SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
.app{width:100%;height:100vh;height:100dvh;position:relative;overflow:hidden;background:var(--bg)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideBack{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes modalUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-5px);opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,122,255,.25)}50%{box-shadow:0 0 0 20px rgba(0,122,255,0)}}
@keyframes textUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}
.screen-full{padding:0}
.screen-fade{animation:fadeIn .35s cubic-bezier(.32,.72,0,1)}
.screen-slide{animation:slideIn .35s cubic-bezier(.32,.72,0,1)}
.screen-back{animation:slideBack .3s cubic-bezier(.32,.72,0,1)}
.screen-scale{animation:scaleIn .3s cubic-bezier(.32,.72,0,1)}
.screen-modal{animation:modalUp .4s cubic-bezier(.32,.72,0,1)}

/* Status bar */
.statusbar{height:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:14px;font-weight:600;color:var(--tx);flex-shrink:0}

/* Inputs */
.inp{width:100%;padding:14px 18px;background:var(--card);border:1.5px solid var(--sep);border-radius:14px;font-size:15px;font-family:inherit;color:var(--tx);outline:none;transition:all .25s;box-shadow:var(--shadow)}
.inp::placeholder{color:var(--tx3)}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,122,255,.1)}
.inp-search{background:var(--card);border:none;border-radius:12px;padding:12px 16px 12px 40px;font-size:14px;box-shadow:var(--shadow)}

/* Buttons */
.btn{padding:16px 0;width:100%;border-radius:16px;font-size:16px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active:not(:disabled){transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.btn-secondary{background:var(--card);color:var(--tx);box-shadow:var(--shadow)}
.btn-text{background:none;color:var(--blue);font-weight:600;padding:8px 0;border:none;cursor:pointer;font-family:inherit;font-size:14px}

/* Header */
.hdr{padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.hdr h1{font-size:18px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.hdr-b{background:none;border:none;color:var(--tx2);cursor:pointer;padding:8px;display:flex;border-radius:12px;transition:all .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.hdr-b:active{transform:scale(.9);background:rgba(0,0,0,.05)}
.hdr-b svg{width:20px;height:20px}

/* Avatar */
.av{width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;position:relative;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.av-s{width:36px;height:36px;font-size:14px;border-radius:18px}
.av-xs{width:32px;height:32px;font-size:13px;border-radius:16px}
.av-l{width:80px;height:80px;font-size:32px;border-radius:40px}
.dot{width:12px;height:12px;background:var(--green);border-radius:6px;border:2.5px solid var(--bg);position:absolute;bottom:-1px;right:-1px}

/* List item */
.li{display:flex;align-items:center;gap:14px;padding:14px 20px;width:100%;border:none;background:transparent;cursor:pointer;text-align:left;font-family:inherit;color:var(--tx);transition:all .15s;-webkit-tap-highlight-color:transparent}
.li:active{transform:scale(.98);background:rgba(0,0,0,.02)}

/* Card */
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}

/* Chat bubbles */
.mr{display:flex;margin-bottom:4px;padding:0 16px}
.mb{max-width:78%;padding:12px 16px;font-size:15px;line-height:1.45;word-break:break-word}
.mb-m{border-radius:20px 20px 6px 20px;background:var(--accent);color:#fff}
.mb-o{border-radius:20px 20px 20px 6px;background:var(--card);color:var(--tx);box-shadow:var(--shadow)}
.mb-t{display:flex;justify-content:flex-end;align-items:center;gap:5px;margin-top:4px;font-size:11px;font-weight:500}
.mb-m .mb-t{color:rgba(255,255,255,.5)}
.mb-o .mb-t{color:var(--tx3)}

/* Typing */
.td{display:flex;align-items:center;gap:4px;padding:2px 0}
.td span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--tx3);animation:dotBounce .8s infinite ease-in-out}
.td span:nth-child(2){animation-delay:.15s}
.td span:nth-child(3){animation-delay:.3s}

/* Chat input */
.ib{padding:8px 16px;display:flex;gap:10px;align-items:center;flex-shrink:0;background:var(--bg)}
.ib input{flex:1;padding:12px 18px;background:var(--card);border:1.5px solid var(--sep);border-radius:24px;font-size:15px;font-family:inherit;color:var(--tx);outline:none;transition:all .25s;box-shadow:var(--shadow)}
.ib input::placeholder{color:var(--tx3)}
.ib input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.1)}
.send-btn{width:40px;height:40px;border-radius:20px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.send-btn:not(:disabled){background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.send-btn:disabled{background:var(--bg3);color:var(--tx3)}
.send-btn:active:not(:disabled){transform:scale(.85)}
.send-btn svg{width:16px;height:16px}

/* Tab bar */
.tb{display:flex;flex-shrink:0;background:rgba(245,240,235,.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);box-shadow:0 -1px 0 var(--sep)}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0 4px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:500;color:var(--tx3);transition:all .2s;-webkit-tap-highlight-color:transparent}
.ti svg{width:24px;height:24px;transition:transform .2s}
.ti.on{color:var(--tx);font-weight:600}
.ti.on svg{transform:scale(1.08)}
.ti:active svg{transform:scale(.85)}

/* Language card */
.lc{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;background:var(--card);cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;width:100%;color:var(--tx);box-shadow:var(--shadow);border:1.5px solid transparent;-webkit-tap-highlight-color:transparent}
.lc:active{transform:scale(.98)}
.lc.sel{border-color:var(--blue);background:rgba(0,122,255,.05);box-shadow:0 0 0 3px rgba(0,122,255,.1)}

/* Bridge bar */
.br{padding:8px 16px;text-align:center;font-size:12px;font-weight:600;color:var(--blue);background:rgba(0,122,255,.06);flex-shrink:0;letter-spacing:.01em}

/* Profile */
.prof-card{margin:0 20px;border-radius:16px;background:var(--card);overflow:hidden;box-shadow:var(--shadow)}
.prof-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.prof-item:active{background:rgba(0,0,0,.02)}
.prof-sep{height:.5px;background:var(--sep);margin-left:16px}

/* Story ring */
.story-ring{width:52px;height:52px;border-radius:26px;padding:2.5px;background:linear-gradient(135deg,#007AFF,#AF52DE);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.story-ring .av{border:2.5px solid var(--bg)}

/* Story circles row */
.story-row{display:flex;gap:16px;padding:0 20px 16px;overflow-x:auto;flex-shrink:0;scroll-snap-type:x mandatory}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;scroll-snap-align:start;cursor:pointer;-webkit-tap-highlight-color:transparent}
.story-item:active{transform:scale(.95)}
.story-item span{font-size:11px;font-weight:500;color:var(--tx2);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.story-av{width:60px;height:60px;border-radius:30px;padding:2.5px;background:linear-gradient(135deg,#007AFF,#AF52DE);display:flex;align-items:center;justify-content:center}
.story-av .av{width:53px;height:53px;border-radius:27px;font-size:20px;border:2.5px solid var(--bg)}
.story-av-add{background:var(--card);box-shadow:var(--shadow);position:relative}
.story-av-add .av{border-color:var(--card)}

/* Post card */
.post-card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);margin:0 16px 14px;overflow:hidden;animation:fadeIn .4s both}
.post-head{display:flex;align-items:center;gap:12px;padding:14px 16px 10px}
.post-head .av{width:40px;height:40px;font-size:16px;border-radius:20px}
.post-name{font-weight:600;font-size:14px;color:var(--tx)}
.post-time{font-size:12px;color:var(--tx3);font-weight:500}
.post-body{padding:0 16px;font-size:14px;line-height:1.55;color:var(--tx);margin-bottom:12px}
.post-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--bg3);border-radius:12px;margin:0 16px 12px;width:calc(100% - 32px)}
.post-actions{display:flex;align-items:center;gap:4px;padding:8px 12px 14px;border-top:.5px solid var(--sep)}
.post-action{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:20px;background:none;border:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.post-action:active{background:rgba(0,0,0,.04);transform:scale(.95)}
.post-action.liked{color:var(--red)}
.post-action svg{width:18px;height:18px}
.post-share{margin-left:auto}

::-webkit-scrollbar{display:none}
</style>
</head>

<script>
// ============ DESIGN ============
const AVATAR_GRAD=[
  'linear-gradient(135deg,#FF6B6B,#EE5A24)',

function R(){
  if(call.on){renderCall();return}
  if(storyV.on){renderStoryV();return}
  const a=document.getElementById('app');
  if(S.screen==='login')a.innerHTML=rLogin();
  else if(S.screen==='onboarding')a.innerHTML=rOnboard();
  else if(S.screen==='main'){a.innerHTML=S.chatWith?rChat():rMain()}

function rLogin(){
  return`&lt;div class=&quot;screen screen-fade&quot; style=&quot;display:flex;flex-direction:column;justify-content:space-between;background:var(--bg)&quot;>
    &lt;div style=&quot;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 32px&quot;>
      &lt;div style=&quot;width:100px;height:100px;border-radius:32px;background:linear-gradient(135deg,#2D2D2D,#1A1A1A);display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:0 12px 40px rgba(0,0,0,.15);animation:logoFloat 3s ease-in-out infinite&quot;>
        &lt;span style=&quot;font-size:48px;font-weight:700;color:#fff&quot;>W&lt;/span>
      &lt;/div>
      &lt;h1 style=&quot;font-size:34px;font-weight:800;color:var(--tx);margin-bottom:8px;text-align:center;letter-spacing:-.03em;animation:textUp .5s .1s both&quot;>Welcome to&lt;br>Weench&lt;/h1>
      &lt;p style=&quot;color:var(--tx2);font-size:15px;text-align:center;line-height:1.5;font-weight:500;animation:textUp .5s .2s both&quot;>Speak yours. Read theirs.&lt;/p>
    &lt;/div>
    &lt;div style=&quot;padding:24px;animation:textUp .5s .3s both&quot;>
      ${login.step==='phone'?rLPhone():rLOTP()}
    &lt;/div>
  &lt;/div>`;
}
function rLPhone(){
  const v=login.phone.length>=10;
  return`&lt;input class=&quot;inp&quot; type=&quot;tel&quot; placeholder=&quot;Phone number&quot; value=&quot;${esc(login.phone)}&quot; oninput=&quot;login.phone=this.value.replace(/\\D/g,'').slice(0,15);updPh()&quot; onkeydown=&quot;if(event.key==='Enter')sendOTP()&quot; data-af>
    ${login.err?`&lt;p style=&quot;color:var(--red);font-size:13px;margin-top:8px;font-weight:500&quot;>${esc(login.err)}&lt;/p>`:''}
    &lt;div style=&quot;height:12px&quot;>&lt;/div>
    &lt;button id=&quot;phBtn&quot; class=&quot;btn btn-primary&quot; onclick=&quot;sendOTP()&quot; ${!v||login.loading?'disabled':''}>${login.loading?'Sending...':'Continue'}&lt;/button>`;
}
function rLOTP(){
  const v=login.otp.length===4;
  return`&lt;input class=&quot;inp&quot; type=&quot;text&quot; value=&quot;${esc(login.otp)}&quot; oninput=&quot;login.otp=this.value.replace(/\\D/g,'').slice(0,4);updOtp();if(login.otp.length===4)setTimeout(verifyOTP,150)&quot; maxlength=&quot;4&quot; data-af style=&quot;letter-spacing:16px;font-size:28px;font-weight:700;text-align:center&quot;>
    &lt;p style=&quot;color:var(--tx2);font-size:13px;margin-top:12px;text-align:center;font-weight:500&quot;>Code sent to +${esc(login.phone)} &lt;button class=&quot;btn-text&quot; onclick=&quot;login.step='phone';login.otp='';login.err='';R()&quot; style=&quot;font-size:13px;padding:0&quot;>Change&lt;/button>&lt;/p>
    ${login.gen?`&lt;div style=&quot;text-align:center;margin-top:12px;padding:12px;background:var(--card);border-radius:14px;box-shadow:var(--shadow)&quot;>&lt;span style=&quot;color:var(--tx3);font-size:12px;font-weight:500&quot;>Demo code&lt;/span>&lt;br>&lt;strong style=&quot;color:var(--tx);letter-spacing:8px;font-size:22px;font-weight:700&quot;>${login.gen}&lt;/strong>&lt;/div>`:''}
    ${login.err?`&lt;p style=&quot;color:var(--red);font-size:13px;margin-top:8px;text-align:center;font-weight:500&quot;>${esc(login.err)}&lt;/p>`:''}
    &lt;div style=&quot;height:12px&quot;>&lt;/div>
    &lt;button id=&quot;otpBtn&quot; class=&quot;btn btn-primary&quot; onclick=&quot;verifyOTP()&quot; ${!v||login.loading?'disabled':''}>${login.loading?'Verifying...':'Log in'}&lt;/button>`;
}
function updPh(){const b=document.getElementById('phBtn');if(b){b.disabled=login.phone.length&lt;10}}
function updOtp(){const b=document.getElementById('otpBtn');if(b){b.disabled=login.otp.length!==4}}
function sendOTP(){if(login.phone.length&lt;10){login.err='Enter a valid number';R();return}login.loading=true;login.err='';R();login.gen=String(1000+Math.floor(Math.random()*9000));setTimeout(()=>{login.loading=false;login.step='otp';R()},400)}
function verifyOTP(){if(login.otp.length!==4)return;if(login.otp!==login.gen){login.err='Wrong code';R();return}login.loading=true;login.err='';R();setTimeout(()=>{let u=Object.values(db.u).find(x=>x.phone===login.phone);if(!u){u={id:uid(),phone:login.phone,name:null,lang:'en',on:true};db.u[u.id]=u}S.user=u;login.loading=false;S.screen=u.name?'main':'onboarding';if(u.name)S.tab='chats';else onboard={step:'name',name:'',lang:'en'};R()},400)}

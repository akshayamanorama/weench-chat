t;காலை வணக்கம்&quot;,&quot;thank you&quot;:&quot;நன்றி&quot;,&quot;yes&quot;:&quot;ஆம்&quot;,&quot;no&quot;:&quot;இல்லை&quot;,&quot;okay&quot;:&quot;சரி&quot;,&quot;bye&quot;:&quot;போய் வருகிறேன்&quot;,&quot;good&quot;:&quot;நல்லது&quot;},&quot;en|te&quot;:{&quot;hello&quot;:&quot;హలో&quot;,&quot;hi&quot;:&quot;హాయ్&quot;,&quot;how are you?&quot;:&quot;మీరు ఎలా ఉన్నారు?&quot;,&quot;good morning&quot;:&quot;శుభోదయం&quot;,&quot;thank you&quot;:&quot;ధన్యవాదాలు&quot;,&quot;yes&quot;:&quot;అవును&quot;,&quot;no&quot;:&quot;కాదు&quot;,&quot;okay&quot;:&quot;సరే&quot;,&quot;bye&quot;:&quot;వీడ్కోలు&quot;,&quot;good&quot;:&quot;మంచిది&quot;},&quot;en|kn&quot;:{&quot;hello&quot;:&quot;ನಮಸ್ಕಾರ&quot;,&quot;hi&quot;:&quot;ಹಾಯ್&quot;,&quot;how are you?&quot;:&quot;ನೀವು ಹೇಗಿದ್ದೀರಿ?&quot;,&quot;good morning&quot;:&quot;ಶುಭೋದಯ&quot;,&quot;thank you&quot;:&quot;ಧನ್ಯವಾದಗಳು&quot;,&quot;yes&quot;:&quot;ಹೌದು&quot;,&quot;no&quot;:&quot;ಇಲ್ಲ&quot;,&quot;okay&quot;:&quot;ಸರಿ&quot;,&quot;bye&quot;:&quot;ವಿದಾಯ&quot;,&quot;good&quot;:&quot;ಒಳ್ಳೆಯದು&quot;},&quot;en|mr&quot;:{&quot;hello&quot;:&quot;नमस्कार&quot;,&quot;hi&quot;:&quot;नमस्कार&quot;,&quot;how are you?&quot;:&quot;तुम्ही कसे आहात?&quot;,&quot;good morning&quot;:&quot;शुभ सकाळ&quot;,&quot;thank you&quot;:&quot;धन्यवाद&quot;,&quot;yes&quot;:&quot;हो&quot;,&quot;no&quot;:&quot;नाही&quot;,&quot;okay&quot;:&quot;ठीक आहे&quot;,&quot;bye&quot;:&quot;निरोप&quot;,&quot;good&quot;:&quot;चांगले&quot;}};

// ============ RENDER ============
function R(){
  if(call.on){renderCall();return}
  if(storyV.on){renderStoryV();return}
  const a=document.getElementById('app');
  if(S.screen==='login')a.innerHTML=rLogin();
  else if(S.screen==='onboarding')a.innerHTML=rOnboard();
  else if(S.screen==='main'){a.innerHTML=S.chatWith?rChat():rMain()}
  requestAnimationFrame(()=>{const f=document.querySelector('[data-af]');if(f){f.focus();if(f.value)f.setSelectionRange(f.value.length,f.value.length)}});
}

// ============ LOGIN ============
function rLogin(){
  return`<div class=&quot;screen&quot; style=&quot;display:flex;flex-direction:column;justify-content:space-between&quot;>
    <div style=&quot;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 32px&quot;>
      <div style=&quot;width:72px;height:72px;border-radius:20px;background:var(--x);display:flex;align-items:center;justify-content:center;margin-bottom:32px&quot;>
        <span style=&quot;font-size:36px;font-weight:800;color:#fff&quot;>W</span>
      </div>
      <h1 style=&quot;font-size:30px;font-weight:800;color:var(--tx);margin-bottom:8px;text-align:center&quot;>Welcome to Weench</h1>
      <p style=&quot;color:var(--tx3);font-size:15px;text-align:center;line-height:1.5&quot;>Speak yours. Read theirs.</p>
    </div>
    <div style=&quot;padding:24px;border-top:1px solid var(--border)&quot;>
      ${login.step==='phone'?rLPhone():rLOTP()}
    </div>
  </div>`;
}
function rLPhone(){
  const v=login.phone.length>=10;
  return`<input class=&quot;inp inp-dark&quot; type=&quot;tel&quot; placeholder=&quot;Phone number&quot; value=&quot;${esc(login.phone)}&quot; oninput=&quot;login.phone=this.value.replace(/\\D/g,'').slice(0,15);updPh()&quot; onkeydown=&quot;if(event.key==='Enter')sendOTP()&quot; data-af>
    ${login.err?`<p style=&quot;color:var(--red);font-size:13px;margin-top:8px&quot;>${esc(login.err)}</p>`:''}
    <div style=&quot;height:16px&quot;></div>
    <button id=&quot;phBtn&quot; class=&quot;btn btn-x&quot; onclick=&quot;sendOTP()&quot; ${!v||login.loading?'disabled':''}>${login.loading?'Sending...':'Next'}</button>`;
}
function rLOTP(){
  const v=login.otp.length===4;
  return`<input class=&quot;inp inp-dark&quot; type=&quot;text&quot; value=&quot;${esc(login.otp)}&quot; oninput=&quot;login.otp=this.value.replace(/\\D/g,'').slice(0,4);updOtp();if(login.otp.length===4)setTimeout(verifyOTP,150)&quot; maxlength=&quot;4&quot; data-af style=&quot;letter-spacing:12px;font-size:24px;font-weight:700;text-align:center&quot;>
    <p style=&quot;color:var(--tx3);font-size:13px;margin-top:10px;text-align:center&quot;>Code sent to +${esc(login.phone)} · <button class=&quot;btn-text&quot; onclick=&quot;login.step='phone';login.otp='';login.err='';R()&quot; style=&quot;font-size:13px;padding:0&quot;>Change</button></p>
    ${login.gen?`<div style=&quot;text-align:center;margin-top:8px;padding:10px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)&quot;><span style=&quot;color:var(--tx3);font-size:12px&quot;>Demo code:</span> <strong style=&quot;color:var(--x);letter-spacing:4px;font-size:18px&quot;>${login.gen}</strong></div>`:''}
    ${login.err?`<p style=&quot;color:var(--red);font-size:13px;margin-top:8px;text-align:center&quot;>${esc(login.err)}</p>`:''}
    <div style=&quot;height:16px&quot;></div>
    <button id=&quot;otpBtn&quot; class=&quot;btn btn-x&quot; onclick=&quot;verifyOTP()&quot; ${!v||login.loading?'disabled':''}>${login.loading?'Verifying...':'Log in'}</button>`;
}
function updPh(){const b=document.getElementById('phBtn');if(b){b.disabled=login.phone.length<10}}
function updOtp(){const b=document.getElementById('otpBtn');if(b){b.disabled=login.otp.length!==4}}
function sendOTP(){if(login.phone.length<10){login.err='Enter a valid number';R();return}login.loading=true;login.err='';R();login.gen=String(1000+Math.floor(Math.random()*9000));setTimeout(()=>{login.loading=false;login.step='otp';R()},400)}
function verifyOTP(){if(login.otp.length!==4)return;if(login.otp!==login.gen){login.err='Wrong code';R();return}login.loading=true;login.err='';R();setTimeout(()=>{let u=Object.values(db.u).find(x=>x.phone===login.phone);if(!u){u={id:uid(),phone:login.phone,name:null,lang:'en',on:true,bio:''};db.u[u.id]=u}S.user=u;login.loading=false;S.screen=u.name?'main':'onboarding';if(u.name)S.tab='chats';else onboard={step:'name',name:'',lang:'en'};R()},400)}

// ============ MAIN ============
function rMain(){
  let c='';
  if(S.tab==='chats')c=rChatList();
  else if(S.tab==='contacts')c=rContacts();
  else if(S.tab==='stories')c=rStories();
  else if(S.tab==='profile')c=rProfile();
  return`<div class=&quot;screen&quot;>${c}${rTabs()}</div>`;
}
function rTabs(){
  return`<div class=&quot;tb&quot;>${[{id:'chats',i:ic.chat,l:'Messages'},{id:'contacts',i:ic.users,l:'People'},{id:'stories',i:ic.story,l:'Stories'},{id:'profile',i:ic.users,l:'Profile'}].map(t=>`<button class=&quot;ti ${S.tab===t.id?'on':''}&quot; onclick=&quot;S.tab='${t.id}';searchQ='';R()&quot;>${t.i}<span>${t.l}</span></button>`).join('')}</div>`;
}

function openChat(u){S.chatWith=u;S.showOrig={};S.typing=false;chatInp='';db.m.forEach(m=>{if(m.s===u.id&amp;&amp;m.r===S.user.id)m.st='read'});R();scrl()}

    </div>`;
}
function addMyStory(){const t=prompt('Write your story:');if(!t?.trim())return;const bgs=['linear-gradient(135deg,#1D9BF0,#7856FF)','linear-gradient(135deg,#F4212E,#FF6B00)','linear-gradient(135deg,#00BA7C,#1D9BF0)','linear-gradient(135deg,#7856FF,#F4212E)','linear-gradient(135deg,#FF6B00,#FFD600)'];const bg=bgs[Math.floor(Math.random()*bgs.length)];const ex=stories.find(s=>s.uid===S.user.id);const st={id:uid(),text:t.trim(),bg,ts:Date.now()};if(ex)ex.items.push(st);else stories.unshift({uid:S.user.id,items:[st]});R()}
function openStory(i){storyV={on:true,ui:i,si:0,prog:0,tmr:null};renderStoryV()}
function renderStoryV(){
  if(!storyV.on)return;const other=stories.filter(s=>s.uid!==S.user?.id);const sd=other[storyV.ui];if(!sd){closeStory();return}const st=sd.items[storyV.si];if(!st){closeStory();return}const u=db.u[sd.uid];
  document.getElementById('app').innerHTML=`<div class=&quot;screen&quot; style=&quot;background:#000&quot;><div style=&quot;position:absolute;inset:0;display:flex;flex-direction:column;background:${st.bg}&quot;>
    <div style=&quot;display:flex;gap:3px;padding:10px 12px 0;z-index:2&quot;>${sd.items.map((_,i)=>`<div style=&quot;flex:1;height:2px;border-radius:1px;background:rgba(255,255,255,.25);overflow:hidden&quot;><div style=&quot;height:100%;background:#fff;width:${i<storyV.si?100:i===storyV.si?storyV.prog:0}%;transition:width .1s linear&quot;></div></div>`).join('')}</div>
    <div style=&quot;display:flex;align-items:center;gap:10px;padding:12px 16px;z-index:2&quot;><div class=&quot;av av-xs&quot; style=&quot;background:rgba(255,255,255,.2);color:#fff&quot;>${(u?.name||'?')[0].toUpperCase()}</div><div style=&quot;flex:1&quot;><div style=&quot;font-weight:800;font-size:14px;color:#fff&quot;>${esc(u?.name||'')}</div><div style=&quot;font-size:12px;color:rgba(255,255,255,.5)&quot;>${ago(st.ts)}</div></div><button class=&quot;hdr-b&quot; onclick=&quot;closeStory()&quot; style=&quot;color:#fff&quot;>${ic.x}</button></div>
    <div style=&quot;flex:1;display:flex;align-items:center;justify-content:center;padding:40px;z-index:1&quot; onclick=&quot;tapStory(event)&quot;><p style=&quot;font-size:24px;font-weight:800;color:#fff;text-align:center;line-height:1.5;text-shadow:0 2px 8px rgba(0,0,0,.3)&quot;>${esc(st.text)}</p></div>
  </div></div>`;
  if(storyV.tmr)clearInterval(storyV.tmr);storyV.prog=0;
  storyV.tmr=setInterval(()=>{storyV.prog+=2;if(storyV.prog>=100){storyV.si++;if(storyV.si>=sd.items.length){storyV.ui++;storyV.si=0;if(storyV.ui>=other.length){closeStory();return}}storyV.prog=0;renderStoryV();return}const bars=document.querySelectorAll('[style*=&quot;transition:width&quot;]');if(bars[storyV.si])bars[storyV.si].style.width=storyV.prog+'%'},100);
}
function tapStory(e){const r=e.currentTarget.getBoundingClientRect();const other=stories.filter(s=>s.uid!==S.user?.id);const sd=other[storyV.ui];if(!sd)return;if(e.clientX-r.left>r.width/2){storyV.si++;if(storyV.si>=sd.items.length){storyV.ui++;storyV.si=0;if(storyV.ui>=other.length){closeStory();return}}}else{if(storyV.si>0)storyV.si--}storyV.prog=0;renderStoryV()}
function closeStory(){if(storyV.tmr)clearInterval(storyV.tmr);storyV={on:false,ui:0,si:0,prog:0,tmr:null};R()}

// Call
function startCall(type){if(!S.chatWith)return;call={on:true,type,user:S.chatWith,muted:false,speaker:false,sec:0,tmr:null};renderCall();setTimeout(()=>{call.tmr=setInterval(()=>{call.sec++;updCT()},1000);renderCall()},2000)}
function renderCall(){
  const u=call.user;if(!u)return;const c=call.tmr!==null;
  document.getElementById('app').innerHTML=`<div class=&quot;screen&quot; style=&quot;background:#000&quot;>
    <div style=&quot;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px&quot;>
      <div class=&quot;av av-l&quot; style=&quot;width:96px;height:96px;font-size:36px;${!c?'animation:pulse 2s infinite':''}&quot;>${(u.name||'?')[0].toUpperCase()}</div>
      <h2 style=&quot;font-size:22px;font-weight:800;margin-top:8px&quot;>${esc(u.name)}</h2>
      <p style=&quot;color:var(--tx3);font-size:14px&quot;>@${esc((u.name||'').toLowerCase().replace(/\s/g,''))}</p>
      <p id=&quot;cSt&quot; style=&quot;color:var(--tx2);font-size:16px;margin-top:4px;font-weight:600&quot;>${c?fmtS(call.sec):(call.type==='video'?'Video calling...':'Calling...')}</p>
    </div>
    <div style=&quot;padding:24px 40px 60px;display:flex;justify-content:center;gap:20px&quot;>
      <button onclick=&quot;call.muted=!call.muted;renderCall()&quot; style=&quot;width:56px;height:56px;border-radius:9999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:${call.muted?'var(--tx)':'var(--bg3)'};color:${call.muted?'#000':'var(--tx)'};transition:all .15s&quot;><div style=&quot;width:22px;height:22px&quot;>${call.muted?ic.micOff:ic.mic}</div></button>
      <button onclick=&quot;call.speaker=!call.speaker;renderCall()&quot; style=&quot;width:56px;height:56px;border-radius:9999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:${call.speaker?'var(--tx)':'var(--bg3)'};color:${call.speaker?'#000':'var(--tx)'};transition:all .15s&quot;><div style=&quot;width:22px;height:22px&quot;>${ic.speaker}</div></button>
      <button onclick=&quot;endCall()&quot; style=&quot;width:56px;height:56px;border-radius:9999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--red);color:#fff&quot;><div style=&quot;width:22px;height:22px;transform:rotate(135deg)&quot;>${ic.phone}</div></button>
    </div>
  </div><style>@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(29,155,240,.3)}50%{box-shadow:0 0 0 20px rgba(29,155,240,0)}}</style>`;
}
function updCT(){const e=document.getElementById('cSt');if(e)e.textContent=fmtS(call.sec)}
function endCall(){if(call.tmr)clearInterval(call.tmr);call={on:false,type:'audio',user:null,muted:false,speaker:false,sec:0,tmr:null};R();scrl()}

// Profile
function rProfile(){
  const u=S.user,lo=LANGS.find(l=>l.c===u.lang);
  const mc=db.m.filter(m=>m.s===u.id||m.r===u.id).length;
  return`<div class=&quot;hdr&quot;><h1>Profile</h1></div>
    <div style=&quot;flex:1;overflow-y:auto&quot;>
      <div style=&quot;padding:24px;display:flex;flex-direction:column;align-items:center&quot;>
        <div class=&quot;av av-l&quot; style=&quot;margin-bottom:12px&quot;>${(u.name||'?')[0].toUpperCase()}</div>
        <h2 style=&quot;font-size:20px;font-weight:800&quot;>${esc(u.name)}</h2>
        <p style=&quot;color:var(--tx3);font-size:14px;margin-top:2px&quot;>@${esc((u.name||'').toLowerCase().replace(/\s/g,''))}</p>
        <p style=&quot;color:var(--tx2);font-size:14px;margin-top:12px&quot;>${mc} messages sent</p>
      </div>
      <div class=&quot;sep&quot;></div>
      <div class=&quot;prof-item&quot; onclick=&quot;editName()&quot;><div><div style=&quot;font-size:14px;font-weight:700&quot;>Name</div><div style=&quot;font-size:14px;color:var(--tx3);margin-top:2px&quot;>${esc(u.name)}</div></div><div style=&quot;color:var(--tx3);width:18px;height:18px&quot;>${ic.chevR}</div></div>
      <div class=&quot;prof-item&quot; onclick=&quot;editLang()&quot;><div><div style=&quot;font-size:14px;font-weight:700&quot;>Language</div><div style=&quot;font-size:14px;color:var(--tx3);margin-top:2px&quot;>${lo?lo.f+' '+lo.n:u.lang}</div></div><div style=&quot;color:var(--tx3);width:18px;height:18px&quot;>${ic.chevR}</div></div>
      <div class=&quot;prof-item&quot;><div><div style=&quot;font-size:14px;font-weight:700&quot;>Phone</div><div style=&quot;font-size:14px;color:var(--tx3);margin-top:2px&quot;>+${esc(u.phone)}</div></div></div>
      <div class=&quot;sep&quot; style=&quot;margin:8px 0&quot;></div>
      <div class=&quot;prof-item&quot; onclick=&quot;doLogout()&quot; style=&quot;color:var(--red)&quot;><div style=&quot;display:flex;align-items:center;gap:12px&quot;><div style=&quot;width:20px;height:20px&quot;>${ic.logout}</div><span style=&quot;font-weight:700&quot;>Log out</span></div></div>
      <div style=&quot;text-align:center;padding:24px;color:var(--tx3);font-size:12px&quot;>Weench v1.0</div>
    </div>`;
}
function editName(){const n=prompt('Name:',S.user.name);if(n?.trim().length>=2){S.user.name=n.trim();db.u[S.user.id]=S.user;R()}}
function editLang(){const c=prompt('Language ('+LANGS.map(l=>l.n).join(', ')+'):',LN[S.user.lang]);if(c){const m=LANGS.find(l=>l.n.toLowerCase()===c.toLowerCase());if(m){S.user.lang=m.c;db.u[S.user.id]=S.user;R()}}}
function doLogout(){if(!confirm('Log out?'))return;S={user:null,screen:'login',tab:'chats',chatWith:null,showOrig:{},typing:false};login={step:'phone',phone:'',otp:'',gen:'',err:'',loading:false};R()}

// ============ CHAT ============
function rChat(){
  const o=S.chatWith,ms=getMsgs(),ml=S.user.lang,tl=o.lang,cl=ml!==tl;
  return`<div class=&quot;screen&quot;>
    <div class=&quot;hdr&quot; style=&quot;gap:12px&quot;>
      <button class=&quot;hdr-b&quot; onclick=&quot;S.chatWith=null;chatInp='';R()&quot;>${ic.back}</button>
      <div class=&quot;av av-s&quot;>${(o.name||'?')[0].toUpperCase()}</div>
      <div style=&quot;flex:1;min-width:0&quot;>
        <div style=&quot;font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis&quot;>${esc(o.name)}</div>
        <div style=&quot;font-size:12px;color:var(--tx3)&quot;>${o.on?'Active now':'Offline'}</div>
      </div>
      <button class=&quot;hdr-b&quot; onclick=&quot;startCall('audio')&quot;>${ic.phone}</button>
      <button class=&quot;hdr-b&quot; onclick=&quot;startCall('video')&quot;>${ic.video}</button>
    </div>
    ${cl?`<div class=&quot;br&quot;>${LN[ml]} ⟷ ${LN[tl]} · auto-translating</div>`:''}
    <div id=&quot;mL&quot; style=&quot;flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:3px;background:var(--bg)&quot;>
      ${ms.length===0?`<div style=&quot;text-align:center;padding:60px 20px&quot;>
        <div class=&quot;av av-l&quot; style=&quot;margin:0 auto 16px&quot;>${(o.name||'?')[0].toUpperCase()}</div>
        <div style=&quot;font-weight:800;font-size:16px;margin-bottom:4px&quot;>${esc(o.name)}</div>
        <div style=&quot;color:var(--tx3);font-size:13px;margin-bottom:4px&quot;>@${esc((o.name||'').toLowerCase().replace(/\s/g,''))}</div>
        ${cl?`<div style=&quot;color:var(--tx3);font-size:13px;margin-top:12px&quot;>You type ${LN[ml]}, they read ${LN[tl]}</div>`:''}</div>`:''}
      ${ms.map(m=>rMsg(m)).join('')}
      ${S.typing?'<div class=&quot;mr&quot;><div class=&quot;mb mb-o&quot; style=&quot;padding:14px 18px&quot;><div class=&quot;td&quot;><span></span><span></span><span></span></div></div></div>':''}
      <div id=&quot;cE&quot;></div>
    </div>
    <div class=&quot;ib&quot;><input id=&quot;cI&quot; placeholder=&quot;Start a new message&quot; value=&quot;${esc(chatInp)}&quot; oninput=&quot;chatInp=this.value;updSB()&quot; onkeydown=&quot;if(event.key==='Enter'&amp;&amp;!event.shiftKey){event.preventDefault();doSend()}&quot; data-af>
    <button class=&quot;sb&quot; id=&quot;sB&quot; onclick=&quot;doSend()&quot; ${!chatInp.trim()||chatSending?'disabled':''}>${ic.send}</button></div>
  </div>`;
}
function rMsg(m){
  const so=S.showOrig[m.id],ht=m.ot!==m.tt&amp;&amp;m.sl!==m.rl;
  let dt=m.mine?m.ot:(so?m.ot:(m.tt||m.ot));
  return`<div class=&quot;mr&quot; style=&quot;justify-content:${m.mine?'flex-end':'flex-start'}&quot;>
    <div class=&quot;mb ${m.mine?'mb-m':'mb-o'}&quot; ${!m.mine&amp;&amp;ht?`onclick=&quot;togO('${m.id}')&quot; style=&quot;cursor:pointer&quot;`:''}>
      <div>${esc(dt)}</div>
      <div class=&quot;mb-t&quot;>
        ${!m.mine&amp;&amp;ht?`<span style=&quot;cursor:pointer;text-decoration:underline;opacity:.7&quot;>${so?'translated':'original'}</span>`:''}
        <span>${fmtT(m.ts)}</span>${m.mine?'<span style=&quot;opacity:.5&quot;>✓✓</span>':''}
      </div>
    </div>
  </div>`;
}
function togO(id){S.showOrig[id]=!S.showOrig[id];R();scrl()}
function updSB(){const b=document.getElementById('sB');if(!b)return;const h=chatInp.trim().length>0;b.disabled=!h;b.style.background=h?'var(--x)':'var(--bg3)';b.style.color=h?'#fff':'var(--tx3)'}
function scrl(){setTimeout(()=>{const e=document.getElementById('cE');if(e)e.scrollIntoView({behavior:'smooth'})},60)}

async function doSend(){
  const t=chatInp.trim();if(!t||chatSending)return;chatSending=true;
  const ml=S.user.lang,tl=S.chatWith.lang;
  let v=t;if(ml!==tl){try{v=await tr(t,ml,tl)}catch(e){}}
  db.m.push({id:uid(),s:S.user.id,r:S.chatWith.id,ot:t,tt:v,sl:ml,rl:tl,ts:new Date().toISOString(),st:'delivered'});
  chatInp='';chatSending=false;R();scrl();
  setTimeout(()=>{const i=document.getElementById('cI');if(i)i.focus()},50);
  if(S.chatWith.id.startsWith('d')){const rl=S.chatWith.lang;
    setTimeout(async()=>{S.typing=true;R();scrl();await new Promise(r=>setTimeout(r,600+Math.random()*1000));
    const rps=autoR[rl]||autoR.en;const rt=rps[Math.floor(Math.random()*rps.length)];
    let rv=rt;if(rl!==ml){try{rv=await tr(rt,rl,ml)}catch(e){}}
    db.m.push({id:uid(),s:S.chatWith.id,r:S.user.id,ot:rt,tt:rv,sl:rl,rl:ml,ts:new Date().toISOString(),st:'read'});
    S.typing=false;R();scrl()},800+Math.random()*1500)}
}

R();
</script>
